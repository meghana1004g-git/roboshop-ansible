- name: create ec2 and r53 records
  hosts: all
  connection: local
  vars: 
   sg_id: sg-0ba44c612d40aca57
   ami_id: ami-0220d79f3f480ecf5
   domain_name: indurthi.online
   env: dev 
   action: create
   instances: 
   - mongodb
   - catalogue

   ## CREATE ##
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      vpc_subnet_id: subnet-0430e34e03b503da0
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output
    when: action == "create"

  - name:  print the output
    ansible.builtin.debug:
     msg: "{{ ec2_output }}"
    when: action == "create" 

  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name}}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name}}" #mongodb-dev.indurthi.online, frontend-dev.indurthi.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true 
    loop: "{{ ec2_output.results }}" 
    when: action == "create"   
  
  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env }}.{{ domain_name }}" #roboshop-dev.indurthi.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: true 
    loop: "{{ ec2_output.results }}"  
    when: # and
    - item.item == "frontend" 
    - action == "create"

   ### DESTROY ### 
  - name: delete r53 records
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{ item }}-{{ env }}.{{ domain_name }}" #roboshop-dev.indurthi.online
      type: A
      ttl: 1
    loop: "{{ instances }}" 
    when: action == "destroy" 

  - name: delete ec2 instance
    amazon.aws.ec2_instance:
       state: absent
       name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    when: action == "destroy"