- name: create ec2 and r53 records
  hosts: localhost
  connection: local
  vars: 
   sg_id: sg-0ba44c612d40aca57
   ami_id: ami-0220d79f3f480ecf5
   domain_name: indurthi.online
   env: dev 
   instances: 
   - mongodb
   - catalogue
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      vpc_subnet_id: subnet-0430e34e03b503da0
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name:  print the output
    ansible.builtin.debug:
     msg: "{{ ec2_output }}"

  - name: create r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name}}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name}}" #mongodb_dev.indurthi.online
      type: A
      ttl: 1
      value: "{{ item.instances }}"
      wait: true 
    loop: "{{ ec2_output.result }}"    
